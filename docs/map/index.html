<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GB-STAMP — interactive map</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@3.0.6/dist/pmtiles.js"></script>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,sans-serif}
  #map{position:absolute;inset:0}
  .panel{position:absolute;top:12px;left:12px;background:#fffdf7;border:1px solid #d9d2c2;border-radius:8px;
         padding:12px 14px;max-width:290px;box-shadow:0 2px 10px rgba(0,0,0,.14);font-size:13px;line-height:1.45}
  .panel h1{font-size:17px;margin:0 0 2px;font-family:Georgia,serif}
  .panel a{color:#a5322e}
  .muted{color:#777;font-size:12px}
  .hd{display:flex;justify-content:space-between;align-items:baseline;font-weight:600}
  .hd .mini{font-weight:400;font-size:11px;cursor:pointer;color:#a5322e}
  .hd .mini:hover{text-decoration:underline}
  #types{max-height:44vh;overflow-y:auto;margin-top:5px;padding-right:2px}
  .row{display:flex;align-items:center;gap:7px;margin-top:3px;cursor:pointer;user-select:none}
  .dot{width:12px;height:12px;border-radius:50%;flex:0 0 auto;border:1px solid rgba(0,0,0,.15)}
  .row .lab{flex:1 1 auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .ct{color:#999;font-size:11px;flex:0 0 auto;font-variant-numeric:tabular-nums}
  .row.off{opacity:.38}
  hr{border:none;border-top:1px solid #e7e0d0;margin:11px 0}
  .fade{width:100%;margin-top:4px}
  .maplibregl-popup-content{font-family:system-ui,sans-serif;font-size:13px}
  .pt{font-family:Georgia,serif;font-size:15px;font-weight:700;margin-bottom:2px}
  #cred{margin-top:9px}
</style>
</head>
<body>
<div id="map"></div>
<div class="panel">
  <h1>GB-STAMP</h1>
  <div class="muted" id="count">loading…</div>

  <hr>
  <div class="hd"><span>Feature type (AAT)</span>
    <span><span class="mini" id="selall">all</span> · <span class="mini" id="selnone">none</span></span></div>
  <div id="types"><div class="muted">building filter…</div></div>

  <hr>
  <label style="font-weight:600">OS six-inch map <span class="muted" id="opv">0%</span></label>
  <input class="fade" type="range" id="fade" min="0" max="100" value="0">
  <div class="muted">Slide to fade the original OS six-inch map (NLS) over the modern base.</div>

  <div class="muted" id="cred">A demo of the <a href="../">GB-STAMP</a> output — markers are coloured by recovered feature type; points at high zoom, a heatmap when zoomed out.</div>
</div>
<script>
// PMTiles of the full typed set is range-requested — the browser only pulls the tiles it needs.
const PM = new URL("../data/gb_stamp.pmtiles", location.href).href;
const TYPES_URL = new URL("../data/types.json", location.href).href;
const SRCLAYER = "stamp";
const PALETTE=["#3f6fa8","#c07a2b","#4c9a5a","#8a4fa0","#c94f6d","#2a9d9b","#b0902a","#7a6cc4",
               "#d06a3f","#5a8f3a","#a0508a","#4a7fb0","#9c7b3a","#3f9d70","#b04a4a","#6a6f78"];
const GREY="#9a938a";

const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile);

const map=new maplibregl.Map({
  container:"map",
  style:{version:8,glyphs:"https://fonts.openmaptiles.org/{fontstack}/{range}.pbf",sources:{
      carto:{type:"raster",tiles:["https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png"],tileSize:256,
             attribution:'&copy; OpenStreetMap contributors, &copy; CARTO'},
      os:{type:"raster",tiles:["https://mapseries-tilesets.s3.amazonaws.com/os/6inchsecond/{z}/{x}/{y}.png"],
          tileSize:256,minzoom:10,maxzoom:17,attribution:'OS six-inch &copy; National Library of Scotland'}},
    layers:[{id:"base",type:"raster",source:"carto"},
            {id:"osmap",type:"raster",source:"os",paint:{"raster-opacity":0}}]},
  center:[-3.0,54.3],zoom:5.4,maxzoom:18
});
map.addControl(new maplibregl.NavigationControl(),"top-right");
map.addControl(new maplibregl.ScaleControl(),"bottom-left");

const active=new Set();            // active type keys
let colorOf={};                    // type key -> hex

function colorExpr(){
  const m=["match",["get","ty"]];
  for(const[k,c]of Object.entries(colorOf)) m.push(k,c);
  m.push(GREY); return m;
}
function filterExpr(){ return ["in",["get","ty"],["literal",[...active]]]; }
function applyFilter(){
  if(map.getLayer("pts")){map.setFilter("pts",filterExpr());map.setFilter("heat",filterExpr());}
}

Promise.all([
  fetch(TYPES_URL).then(r=>r.json())
]).then(([td])=>{
  const keys=td.types.map(t=>t.key);
  const cnt={}; td.types.forEach(t=>cnt[t.key]=t.n);
  keys.forEach((k,i)=>{colorOf[k]=PALETTE[i%PALETTE.length]; active.add(k);});

  map.on("load",()=>{
    map.addSource("stamp",{type:"vector",url:"pmtiles://"+PM});
    map.addLayer({id:"heat",type:"heatmap",source:"stamp","source-layer":SRCLAYER,maxzoom:10,paint:{
      "heatmap-weight":0.6,
      "heatmap-intensity":["interpolate",["linear"],["zoom"],4,0.8,9,2],
      "heatmap-radius":["interpolate",["linear"],["zoom"],4,10,9,26],
      "heatmap-opacity":["interpolate",["linear"],["zoom"],7.5,0.9,10,0],
      "heatmap-color":["interpolate",["linear"],["heatmap-density"],
        0,"rgba(0,0,0,0)",0.2,"#f4d9b0",0.45,"#e0a24a",0.7,"#c07a2b",1,"#8a3d1f"]}});
    map.addLayer({id:"pts",type:"circle",source:"stamp","source-layer":SRCLAYER,paint:{
      "circle-color":colorExpr(),
      "circle-radius":["interpolate",["linear"],["zoom"],7,1.4,9,2.4,13,4.6,16,7.5],
      "circle-opacity":["interpolate",["linear"],["zoom"],7,0,9,0.55,11,0.9],
      "circle-stroke-width":["interpolate",["linear"],["zoom"],10,0,13,0.7],"circle-stroke-color":"#fff"}});
    applyFilter();

    map.on("click","pts",e=>{
      const p=e.features[0].properties;
      new maplibregl.Popup().setLngLat(e.lngLat).setHTML(
        `<div class="pt">${(p.t||"").replace(/</g,"&lt;")}</div>`+
        `<div><b>type:</b> ${p.ty||"—"}${p.aat?` <span class="muted">(AAT: ${p.aat})</span>`:""}</div>`+
        (p.fs?`<div><b>lettering:</b> ${p.fs}${p.src?` <span class="muted">(${p.src})</span>`:""}</div>`:"")).addTo(map);
    });
    map.on("mouseenter","pts",()=>map.getCanvas().style.cursor="pointer");
    map.on("mouseleave","pts",()=>map.getCanvas().style.cursor="");
  });

  // filter UI
  const box=document.getElementById("types");box.innerHTML="";
  for(const k of keys){
    const el=document.createElement("div");el.className="row";el.dataset.k=k;
    const label=k.replace(/_/g," ");
    el.innerHTML=`<span class="dot" style="background:${colorOf[k]}"></span>`+
      `<span class="lab" title="${label}">${label}</span><span class="ct">${cnt[k].toLocaleString()}</span>`;
    el.addEventListener("click",()=>{
      if(active.has(k)){active.delete(k);el.classList.add("off");}
      else{active.add(k);el.classList.remove("off");}
      applyFilter();
    });
    box.appendChild(el);
  }
  document.getElementById("count").textContent=
    td.total.toLocaleString()+" typed labels · "+keys.length+" types";
});

function setAll(on){
  active.clear();
  document.querySelectorAll("#types .row").forEach(el=>{
    if(on){active.add(el.dataset.k);el.classList.remove("off");}else{el.classList.add("off");}
  });
  applyFilter();
}
document.getElementById("selall").addEventListener("click",()=>setAll(true));
document.getElementById("selnone").addEventListener("click",()=>setAll(false));

const fade=document.getElementById("fade");
fade.addEventListener("input",()=>{
  map.setPaintProperty("osmap","raster-opacity",fade.value/100);
  document.getElementById("opv").textContent=fade.value+"%";});
</script>
</body>
</html>
